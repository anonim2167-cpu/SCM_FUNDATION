    <style>
    .d1 {
        width: 100px;
        height: 100px;
        background-color: rgb(117, 28, 28);
        position: relative;
        animation-name: myAnimation;
        animation-duration: 1s;
        animation-iteration-count: infinite;
        border-radius: 100%;
        display: inline-block;
    }

    .d2 {
        width: 100px;
        height: 100px;
        background-color: rgb(255, 7, 7);
        position: relative;
        animation-name: myAnimation2;
        animation-duration: 2s;
        animation-iteration-count: infinite;
        border-radius: 10%;
        display: inline-block;
        transition: 1s;
    }

    @keyframes myAnimation {
    0%   { left:0px; top:0px; transform: scaleY(1);}
    25%  { left:-30px; top:100px; border-radius: 100%; transform: scaleX(2); transform: rotate(20deg);}
    50%  { left:0px; top:0px;  transform: rotate(20deg)}
    75%  { left:30px; top:100px; border-radius: 100%; transform: scaleX(2); transform: rotate(-20deg);}
    100% { left:0px; top:0px; transform: scaleY(1);}
    }

    @keyframes myAnimation2 {
    0%   { left:0px; top:0px; transform: scaleY(2);}
    25%  { left:-70px; top:100px; border-radius: 100%; transform: scaleX(2); transform: rotate(20deg);}
    50%  { left:0px; top:0px;  transform: rotate(20deg)}
    75%  { left:70px; top:100px; border-radius: 10%; transform: scaleX(2); transform: rotate(-20deg);}
    100% { left:0px; top:0px; transform: scaleY(2);}
    }


</style>
